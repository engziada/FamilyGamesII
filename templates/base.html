<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألعاب العيلة - متعة مع العائلة</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@300;400;600;800&family=Lemonada:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Convex Browser SDK -->
    <script src="https://unpkg.com/convex@1.33.0/dist/browser.bundle.js"></script>
    <script>
      window.__CONVEX_URL__ = "{{ convex_url }}";
    </script>
</head>
<body>
    <a href="#main-content" class="skip-link">تخطي إلى المحتوى الرئيسي</a>
    <!-- Dark mode toggle (top-left corner) -->
    <button id="dark-mode-toggle" class="btn btn-sm position-fixed" style="top: 10px; left: 10px; z-index: 1050; opacity: 0.7;"
      title="تبديل الوضع الداكن">
      <i class="fas fa-moon"></i>
    </button>
    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
        document.addEventListener('DOMContentLoaded', function() {
          const btn = document.getElementById('dark-mode-toggle');
          if (!btn) return;
          function updateIcon() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            btn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
          }
          updateIcon();
          btn.addEventListener('click', function() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateIcon();
          });
        });
      })();
    </script>
    <main id="main-content">
    {% block content %}{% endblock %}
    </main>
    <!-- Core JS modules -->
    <script src="{{ url_for('static', filename='js/convexClient.js') }}"></script>
    <script src="{{ url_for('static', filename='js/gameUI.js') }}"></script>
    <script src="{{ url_for('static', filename='js/timer.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sound.js') }}"></script>
    <script src="{{ url_for('static', filename='js/reactions.js') }}"></script>
    {% block scripts %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
